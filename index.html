<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OutNow" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>OutNow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">outnow</div>
  <div class="splash-sub">Plus d'excuses pour rester chez toi.</div>
</div>

<div id="app" class="hidden">

  <!-- ── AUTH ── -->
  <div id="screen-auth" class="screen active">
    <div class="auth-bg"></div>
    <div class="auth-content">
      <div class="auth-logo">outnow</div>
      <div class="auth-tagline">Plus d'excuses pour rester chez toi.</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Connexion</button>
        <button class="auth-tab" id="tab-register">Inscription</button>
      </div>
      <div id="form-login" class="auth-form">
        <input type="email" id="login-identifier" placeholder="Adresse email" class="text-input" />
        <input type="password" id="login-password" placeholder="Mot de passe" class="text-input" />
        <div id="login-error" class="auth-error hidden"></div>
        <button class="btn-primary" id="btn-login">Se connecter</button>
      </div>
      <div id="form-register" class="auth-form hidden">
        <input type="text" id="reg-username" placeholder="Pseudo (unique, 3 car. min)" class="text-input" />
        <input type="email" id="reg-email" placeholder="Adresse email" class="text-input" />
        <input type="password" id="reg-password" placeholder="Mot de passe (6 car. min)" class="text-input" />
        <div id="reg-error" class="auth-error hidden"></div>
        <button class="btn-primary" id="btn-register">Creer mon compte</button>
      </div>
    </div>
  </div>

  <!-- ── HOME ── -->
  <div id="screen-home" class="screen">
    <header class="app-header">
      <div class="header-logo">outnow</div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-filter">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </button>
      </div>
    </header>
    <div class="category-bar">
      <button class="cat-pill active" data-cat="all">Tout</button>
      <button class="cat-pill" data-cat="concert">🎵 Concerts</button>
      <button class="cat-pill" data-cat="expo">🖼️ Expos</button>
      <button class="cat-pill" data-cat="soiree">🍸 Soirees</button>
      <button class="cat-pill" data-cat="sport">⚽ Sport</button>
      <button class="cat-pill" data-cat="food">🍕 Food</button>
    </div>
    <div class="card-stack" id="card-stack"></div>
    <div class="action-bar">
      <button class="action-btn dislike" id="btn-dislike">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="action-btn super" id="btn-super">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
      <button class="action-btn like" id="btn-like">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
  </div>

  <!-- ── DETAIL ── -->
  <div id="screen-detail" class="screen" style="overflow-y:auto;-webkit-overflow-scrolling:touch;">
    <div class="detail-header">
      <button class="back-btn" id="btn-back-detail">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <button class="share-btn" id="btn-share-detail">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- ── AMIS ── -->
  <div id="screen-friends" class="screen">
    <header class="app-header">
      <div class="header-logo">Amis</div>
      <button class="icon-btn" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </header>
    <div class="friends-content">
      <div class="search-bar-wrap">
        <input type="text" id="friend-search-input" placeholder="Rechercher un pseudo..." class="text-input search-input" />
      </div>
      <div id="search-results"></div>
      <div id="pending-requests"></div>
      <div class="section-label">Mes amis</div>
      <div id="friends-list"></div>
    </div>
  </div>

  <!-- ── GROUPES LIST ── -->
  <div id="screen-groups" class="screen">
    <header class="app-header">
      <div class="header-logo">Groupes</div>
      <button class="icon-btn" id="btn-new-group">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </header>
    <div id="my-groups-list" style="padding:16px;overflow-y:auto;flex:1;"></div>

    <!-- Create Group Modal -->
    <div id="create-group-modal" class="modal hidden">
      <div class="modal-content">
        <h2 style="margin-bottom:16px">Nouveau groupe</h2>
        <input type="text" id="new-group-name" placeholder="Nom du groupe" class="text-input" style="margin-bottom:12px" />
        <div class="section-label" style="margin-bottom:8px">Ajouter des amis</div>
        <div id="friend-picker" style="margin-bottom:16px"></div>
        <button class="btn-primary" id="btn-confirm-group">Creer le groupe</button>
        <button class="btn-ghost" onclick="document.getElementById('create-group-modal').classList.add('hidden')">Annuler</button>
      </div>
    </div>
  </div>

  <!-- ── GROUPE DETAIL ── -->
  <div id="screen-group-detail" class="screen">
    <header class="app-header">
      <button class="back-btn" id="btn-back-group-detail">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="header-logo" id="group-detail-name">Groupe</div>
      <div style="width:40px"></div>
    </header>

    <!-- Members bar -->
    <div id="group-members-bar" class="group-members-bar"></div>

    <!-- Tabs -->
    <div class="group-tabs">
      <button class="group-tab-btn active" data-tab="chat" onclick="switchGroupTab('chat')">💬 Chat</button>
      <button class="group-tab-btn" data-tab="swipe" onclick="switchGroupTab('swipe')">🔥 Swipe</button>
      <button class="group-tab-btn" data-tab="matches" onclick="switchGroupTab('matches')">🎉 Matchs</button>
    </div>

    <!-- Chat -->
    <div class="group-tab-content" data-tab="chat" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
      <div id="chat-messages" class="chat-messages" style="flex:1;overflow-y:auto;padding:16px;min-height:0;"></div>
      <div class="chat-input-bar" style="display:flex!important;gap:8px;padding:12px 16px;border-top:1px solid #1c1c28;background:#0a0a0f;flex-shrink:0;min-height:60px;">
        <input type="text" id="chat-input" placeholder="Message..." class="chat-input" />
        <button class="send-btn" id="btn-send-message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
    </div>

    <!-- Swipe -->
    <div class="group-tab-content hidden" data-tab="swipe">
      <div class="card-stack" id="group-swipe-stack"></div>
      <div class="action-bar">
        <button class="action-btn dislike" id="grp-btn-dislike">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="action-btn like" id="grp-btn-like">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    </div>

    <!-- Matches -->
    <div class="group-tab-content hidden" data-tab="matches">
      <div id="group-matches-list" style="padding:16px;overflow-y:auto;flex:1;padding-bottom:80px;"></div>
    </div>
  </div>

  <!-- ── LIKES ── -->
  <div id="screen-likes" class="screen">
    <header class="app-header"><div class="header-logo">Mes Likes</div></header>
    <div class="likes-grid" id="likes-grid"></div>
  </div>

  <!-- ── FILTER PANEL ── -->
  <div id="filter-panel" class="panel hidden">
    <div class="panel-handle"></div>
    <h3>Filtres</h3>
    <div class="filter-section">
      <label>Distance</label>
      <div class="range-row">
        <input type="range" id="filter-distance" min="1" max="50" value="15" />
        <span id="filter-distance-val">15 km</span>
      </div>
    </div>
    <div class="filter-section">
      <label>Budget max</label>
      <div class="budget-pills">
        <button class="budget-pill active" data-val="0">Gratuit</button>
        <button class="budget-pill" data-val="15">-15€</button>
        <button class="budget-pill" data-val="30">-30€</button>
        <button class="budget-pill" data-val="999">Peu importe</button>
      </div>
    </div>
    <button class="btn-primary" id="btn-apply-filter">Appliquer</button>
  </div>
  <div id="panel-overlay" class="hidden"></div>

  <!-- ── MATCH MODAL ── -->
  <div id="match-modal" class="modal hidden">
    <div class="modal-content">
      <div class="match-burst">🎉</div>
      <h2>C'est un match !</h2>
      <div class="match-event-name" id="match-event-name"></div>
      <p>Tout le groupe a like !</p>
      <button class="btn-primary" id="btn-match-ok">Super !</button>
    </div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <div id="bottom-nav-wrap" class="hidden">
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span>Decouvrir</span>
      </button>
      <button class="nav-item" data-screen="groups">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Groupes</span>
      </button>
      <button class="nav-item" data-screen="likes">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Mes Likes</span>
      </button>
      <button class="nav-item" data-screen="friends">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Amis</span>
      </button>
    </nav>
  </div>

</div><!-- #app -->

<script src="data/events.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/friends.js"></script>
<script src="js/groups.js"></script>
<script>
  // Init
  window.addEventListener('load', function() {
    setTimeout(function() {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('app').classList.remove('hidden');
      initAuth();
    }, 1800);
  });

  // Nav
  document.querySelectorAll('.nav-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var s = btn.dataset.screen;
      showScreen(s);
      document.querySelectorAll('.nav-item').forEach(function(n) {
        n.classList.toggle('active', n.dataset.screen === s);
      });
      if (s === 'likes') renderLikes();
      if (s === 'friends') { loadFriends(); loadPendingRequests(); }
      if (s === 'groups') loadUserGroups();
    });
  });

  // Back buttons
  document.getElementById('btn-back-detail').addEventListener('click', function() { showScreen('home'); });
  document.getElementById('btn-back-group-detail').addEventListener('click', function() { showScreen('groups'); loadUserGroups(); });
  document.getElementById('btn-share-detail').addEventListener('click', function() {
    if (navigator.share && state.currentDetail) {
      navigator.share({ title: state.currentDetail.title, url: window.location.href });
    }
  });

  // Match modal
  document.getElementById('btn-match-ok').addEventListener('click', function() {
    document.getElementById('match-modal').classList.add('hidden');
  });

  // New group
  document.getElementById('btn-new-group').addEventListener('click', function() {
    var picker = document.getElementById('friend-picker');
    picker.innerHTML = friendsList.map(function(f) {
      return '<label class="friend-pick-item">' +
        '<input type="checkbox" value="' + f.id + '" /> ' + f.username +
      '</label>';
    }).join('') || '<div class="empty-state">Ajoute des amis d\'abord !</div>';
    document.getElementById('create-group-modal').classList.remove('hidden');
  });

  document.getElementById('btn-confirm-group').addEventListener('click', function() {
    var name = document.getElementById('new-group-name').value.trim();
    if (!name) { alert('Donne un nom au groupe !'); return; }
    var checked = document.querySelectorAll('#friend-picker input:checked');
    var memberIds = Array.from(checked).map(function(c) { return c.value; });
    document.getElementById('create-group-modal').classList.add('hidden');
    createGroup(name, memberIds);
  });

  // Chat send
  document.getElementById('btn-send-message').addEventListener('click', function() {
    var input = document.getElementById('chat-input');
    sendMessage(input.value);
    input.value = '';
  });
  document.getElementById('chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      sendMessage(this.value);
      this.value = '';
    }
  });

  // SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
